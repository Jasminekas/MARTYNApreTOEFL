<head>

<title>TOEFL Vocabulary — Topic Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tokens ── */
:root {
  --ink:        #0F1923;
  --ink-mid:    #3D4F62;
  --ink-light:  #8A9BB0;
  --paper:      #F8F6F0;
  --paper-mid:  #EDEAE2;
  --paper-dark: #E0DDD5;
  --teal:       #00C4A1;
  --teal-dim:   #00C4A115;
  --teal-mid:   #00C4A130;
  --card-bg:    #FFFFFF;
  --sidebar-w:  260px;
  --font-disp:  'Space Grotesk', sans-serif;
  --font-body:  'Inter', sans-serif;
  --ease:       cubic-bezier(.4,0,.2,1);
}

html { scroll-behavior: smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Layout ── */
.layout {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
}

/* ── Top bar ── */
.topbar {
  grid-column: 1 / -1;
  background: var(--ink);
  padding: 0 2rem;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-logo {
  font-family: var(--font-disp);
  font-size: 1rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.01em;
}

.topbar-logo span { color: var(--teal); }

.topbar-meta {
  font-size: 0.75rem;
  color: var(--ink-light);
  letter-spacing: 0.04em;
}

.search-wrap {
  position: relative;
  flex: 1;
  max-width: 340px;
  margin: 0 2rem;
}

.search-wrap input {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  padding: 6px 12px 6px 34px;
  color: #fff;
  font-family: var(--font-body);
  font-size: 0.82rem;
  outline: none;
  transition: background 0.2s, border-color 0.2s;
}

.search-wrap input::placeholder { color: var(--ink-light); }
.search-wrap input:focus { background: rgba(255,255,255,0.13); border-color: var(--teal); }

.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-light);
  pointer-events: none;
}

/* ── Sidebar ── */
.sidebar {
  background: var(--ink);
  color: #fff;
  padding: 1.5rem 0 3rem;
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--ink-mid) transparent;
}

.sidebar-section {
  padding: 0 1rem;
  margin-bottom: 0.5rem;
}

.sidebar-label {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-light);
  padding: 0.75rem 0.75rem 0.4rem;
  display: block;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.65);
  font-family: var(--font-body);
  font-size: 0.84rem;
  width: 100%;
  text-align: left;
  text-decoration: none;
}

.nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }

.nav-item.active {
  background: var(--teal-mid);
  color: var(--teal);
  font-weight: 500;
}

.nav-item .icon { font-size: 1rem; flex-shrink: 0; }
.nav-count {
  margin-left: auto;
  font-size: 0.7rem;
  background: rgba(255,255,255,0.08);
  color: var(--ink-light);
  padding: 1px 7px;
  border-radius: 99px;
}

.nav-item.active .nav-count {
  background: var(--teal-mid);
  color: var(--teal);
}

.sidebar-divider {
  height: 1px;
  background: rgba(255,255,255,0.06);
  margin: 0.75rem 1rem;
}

/* ── Main content ── */
.main {
  padding: 2rem 2.5rem 4rem;
  overflow-y: auto;
}

/* ── Topic sections ── */
.topic-section {
  display: none;
}

.topic-section.active { display: block; }

.topic-header {
  margin-bottom: 2rem;
  padding-bottom: 1.25rem;
  border-bottom: 2px solid var(--paper-dark);
}

.topic-eyebrow {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 0.4rem;
}

.topic-title {
  font-family: var(--font-disp);
  font-size: 2rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.03em;
  line-height: 1.15;
  margin-bottom: 0.5rem;
}

.topic-desc {
  font-size: 0.9rem;
  color: var(--ink-mid);
  max-width: 560px;
  line-height: 1.6;
}

.topic-stats {
  display: flex;
  gap: 1.5rem;
  margin-top: 1rem;
}

.stat {
  font-size: 0.75rem;
  color: var(--ink-light);
}

.stat strong { color: var(--ink); font-weight: 600; }

/* ── Controls ── */
.controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 5px 14px;
  border-radius: 99px;
  border: 1px solid var(--paper-dark);
  background: transparent;
  color: var(--ink-mid);
  font-family: var(--font-body);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
}

.filter-btn:hover { border-color: var(--teal); color: var(--teal); }
.filter-btn.active { background: var(--teal); border-color: var(--teal); color: #fff; font-weight: 500; }

.expand-all {
  margin-left: auto;
  padding: 5px 14px;
  border-radius: 6px;
  border: 1px solid var(--paper-dark);
  background: transparent;
  color: var(--ink-mid);
  font-family: var(--font-body);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
}

.expand-all:hover { border-color: var(--ink); color: var(--ink); }

/* ── Vocabulary grid ── */
.vocab-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}

/* ── Vocab card ── */
.card {
  background: var(--card-bg);
  border: 1px solid var(--paper-dark);
  border-radius: 8px;
  overflow: hidden;
  transition: box-shadow 0.2s var(--ease), border-color 0.2s;
  cursor: pointer;
}

.card:hover { border-color: var(--teal); box-shadow: 0 2px 12px rgba(0,196,161,0.1); }
.card.open { border-color: var(--teal); }

.card-top {
  padding: 12px 14px 10px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.card-word-wrap { flex: 1; min-width: 0; }

.card-word {
  font-family: var(--font-disp);
  font-size: 1rem;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.01em;
  line-height: 1.3;
}

.card-pos {
  display: inline-block;
  font-size: 0.68rem;
  font-weight: 500;
  color: var(--teal);
  background: var(--teal-dim);
  padding: 1px 7px;
  border-radius: 3px;
  margin-top: 3px;
  font-family: var(--font-disp);
  letter-spacing: 0.03em;
}

.card-def {
  font-size: 0.83rem;
  color: var(--ink-mid);
  line-height: 1.5;
  padding: 0 14px 10px;
}

.card-toggle {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1px solid var(--paper-dark);
  background: transparent;
  color: var(--ink-light);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 2px;
}

.card.open .card-toggle {
  background: var(--teal);
  border-color: var(--teal);
  color: #fff;
}

.card-example {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s var(--ease), padding 0.3s;
}

.card.open .card-example { max-height: 120px; }

.card-example-inner {
  border-top: 1px solid var(--paper-mid);
  margin: 0 14px;
  padding: 10px 0;
  font-size: 0.81rem;
  color: var(--ink-mid);
  line-height: 1.55;
  font-style: italic;
}

.card-example-inner::before {
  content: '"';
  color: var(--teal);
  font-size: 1rem;
  font-style: normal;
  margin-right: 2px;
}

.card-example-inner::after {
  content: '"';
  color: var(--teal);
  font-size: 1rem;
  font-style: normal;
  margin-left: 2px;
}

/* ── Search results ── */
#search-results {
  display: none;
}

#search-results.active {
  display: block;
}

.search-result-header {
  font-family: var(--font-disp);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 2px solid var(--paper-dark);
}

.no-results {
  color: var(--ink-light);
  font-size: 0.9rem;
  padding: 2rem 0;
}

/* ── Progress bar ── */
.progress-wrap {
  background: var(--paper-mid);
  border-radius: 99px;
  height: 3px;
  overflow: hidden;
  margin-bottom: 1.5rem;
}

.progress-bar {
  height: 100%;
  background: var(--teal);
  border-radius: 99px;
  transition: width 0.4s var(--ease);
  width: 0%;
}

/* ── Mobile ── */
.mobile-nav {
  display: none;
  background: var(--ink);
  padding: 0.75rem 1rem;
  overflow-x: auto;
  gap: 0.5rem;
  scrollbar-width: none;
}

.mobile-nav-btn {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  color: rgba(255,255,255,0.65);
  font-family: var(--font-body);
  font-size: 0.78rem;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}

.mobile-nav-btn.active {
  background: var(--teal);
  border-color: var(--teal);
  color: #fff;
}

@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .mobile-nav { display: flex; }
  .main { padding: 1.25rem 1rem 3rem; }
  .topic-title { font-size: 1.5rem; }
  .vocab-grid { grid-template-columns: 1fr; }
  .search-wrap { max-width: none; }
  .topbar-meta { display: none; }
}
</style>
</head>

</div>

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════

let activeTopicId = topics[0].id;
let expandedAll = false;

function init() {
  renderSidebar();
  renderMobileNav();
  renderAllTopics();
  showTopic(topics[0].id);
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'nav-item';
    btn.id = `nav-${t.id}`;
    btn.onclick = () => showTopic(t.id);
    btn.innerHTML = `
      <span class="icon">${t.icon}</span>
      <span>${t.title}</span>
      <span class="nav-count">${t.words.length}</span>`;
    sidebar.appendChild(btn);
  });
}

function renderMobileNav() {
  const nav = document.getElementById('mobileNav');
  topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'mobile-nav-btn';
    btn.id = `mnav-${t.id}`;
    btn.textContent = t.icon + ' ' + t.title.split(' ')[0];
    btn.onclick = () => showTopic(t.id);
    nav.appendChild(btn);
  });
}

function renderAllTopics() {
  const main = document.getElementById('main');
  topics.forEach(t => {
    const section = document.createElement('div');
    section.className = 'topic-section';
    section.id = `topic-${t.id}`;

    const wordsHtml = t.words.map((w, i) => `
      <div class="card" onclick="toggleCard(this)">
        <div class="card-top">
          <div class="card-word-wrap">
            <div class="card-word">${w.w}</div>
            <span class="card-pos">${w.pos}</span>
          </div>
          <button class="card-toggle" tabindex="-1" aria-hidden="true">+</button>
        </div>
        <div class="card-def">${w.def}</div>
        <div class="card-example">
          <div class="card-example-inner">${w.ex}</div>
        </div>
      </div>`).join('');

    section.innerHTML = `
      <div class="topic-header">
        <div class="topic-eyebrow">${t.icon} Topic</div>
        <h1 class="topic-title">${t.title}</h1>
        <p class="topic-desc">${t.desc}</p>
        <div class="topic-stats">
          <span class="stat"><strong>${t.words.length}</strong> items</span>
          <span class="stat">Click any card to see an example sentence</span>
        </div>
      </div>
      <div class="controls">
        <button class="filter-btn active" onclick="filterCards('all', this, '${t.id}')">All</button>
        <button class="filter-btn" onclick="filterCards('noun', this, '${t.id}')">Nouns</button>
        <button class="filter-btn" onclick="filterCards('verb', this, '${t.id}')">Verbs</button>
        <button class="filter-btn" onclick="filterCards('adj', this, '${t.id}')">Adjectives</button>
        <button class="expand-all" onclick="toggleExpandAll('${t.id}', this)">Expand all</button>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="prog-${t.id}"></div></div>
      <div class="vocab-grid" id="grid-${t.id}">${wordsHtml}</div>`;

    main.appendChild(section);
  });
}

function showTopic(id) {
  activeTopicId = id;

  document.querySelectorAll('.topic-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.mobile-nav-btn').forEach(n => n.classList.remove('active'));

  const section = document.getElementById(`topic-${id}`);
  if (section) section.classList.add('active');

  const navBtn = document.getElementById(`nav-${id}`);
  if (navBtn) navBtn.classList.add('active');

  const mnavBtn = document.getElementById(`mnav-${id}`);
  if (mnavBtn) mnavBtn.classList.add('active');

  document.getElementById('search-results').classList.remove('active');
  updateProgress(id);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleCard(card) {
  const wasOpen = card.classList.contains('open');
  card.classList.toggle('open');
  const btn = card.querySelector('.card-toggle');
  btn.textContent = card.classList.contains('open') ? '−' : '+';
  updateProgress(activeTopicId);
}

function filterCards(type, btn, topicId) {
  btn.closest('.controls').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const grid = document.getElementById(`grid-${topicId}`);
  grid.querySelectorAll('.card').forEach(card => {
    const pos = card.querySelector('.card-pos').textContent.toLowerCase();
    if (type === 'all') {
      card.style.display = '';
    } else if (type === 'noun') {
      card.style.display = pos.includes('n.') ? '' : 'none';
    } else if (type === 'verb') {
      card.style.display = pos.includes('v.') ? '' : 'none';
    } else if (type === 'adj') {
      card.style.display = pos.includes('adj') ? '' : 'none';
    }
  });
}

function toggleExpandAll(topicId, btn) {
  const grid = document.getElementById(`grid-${topicId}`);
  const cards = grid.querySelectorAll('.card');
  const anyOpen = [...cards].some(c => c.classList.contains('open'));

  cards.forEach(card => {
    card.classList.toggle('open', !anyOpen);
    card.querySelector('.card-toggle').textContent = !anyOpen ? '−' : '+';
  });

  btn.textContent = anyOpen ? 'Expand all' : 'Collapse all';
  updateProgress(topicId);
}

function updateProgress(topicId) {
  const grid = document.getElementById(`grid-${topicId}`);
  if (!grid) return;
  const cards = grid.querySelectorAll('.card');
  const open = [...cards].filter(c => c.classList.contains('open')).length;
  const pct = cards.length > 0 ? (open / cards.length) * 100 : 0;
  const bar = document.getElementById(`prog-${topicId}`);
  if (bar) bar.style.width = pct + '%';
}

// ── Search ──────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function () {
  const q = this.value.trim().toLowerCase();
  const resultsDiv = document.getElementById('search-results');

  if (!q) {
    resultsDiv.classList.remove('active');
    document.querySelectorAll('.topic-section').forEach(s => {
      if (s.id === `topic-${activeTopicId}`) s.classList.add('active');
    });
    return;
  }

  document.querySelectorAll('.topic-section').forEach(s => s.classList.remove('active'));
  resultsDiv.classList.add('active');

  const hits = [];
  topics.forEach(t => {
    t.words.forEach(w => {
      if (w.w.toLowerCase().includes(q) || w.def.toLowerCase().includes(q) || w.ex.toLowerCase().includes(q)) {
        hits.push({ ...w, topicTitle: t.title, topicIcon: t.icon });
      }
    });
  });

  if (hits.length === 0) {
    resultsDiv.innerHTML = `<div class="search-result-header">Search: "${this.value}"</div><p class="no-results">No results found. Try a different word or phrase.</p>`;
    return;
  }

  const cardsHtml = hits.map(w => `
    <div class="card" onclick="toggleCard(this)">
      <div class="card-top">
        <div class="card-word-wrap">
          <div class="card-word">${w.w}</div>
          <span class="card-pos">${w.pos}</span>
        </div>
        <button class="card-toggle" tabindex="-1" aria-hidden="true">+</button>
      </div>
      <div class="card-def">${w.def}</div>
      <div class="card-example"><div class="card-example-inner">${w.ex}</div></div>
    </div>`).join('');

  resultsDiv.innerHTML = `
    <div class="search-result-header">${hits.length} result${hits.length !== 1 ? 's' : ''} for "${this.value}"</div>
    <div class="vocab-grid">${cardsHtml}</div>`;
});

init();
</script>
</body>
</html>
